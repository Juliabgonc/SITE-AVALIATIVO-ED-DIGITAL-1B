<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Equus | Arte e Conexão na Equitação</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <a href="#conteudo-principal" class="skip-link">Pular para o conteúdo</a>

    <header class="header">
        <nav class="nav-container" aria-label="Navegação Principal">
            <div class="logo">EQUUS</div>
            <div class="a11y-controls">
                <button onclick="changeFontSize('increase')" aria-label="Aumentar Fonte">A+</button>
                <button onclick="changeFontSize('decrease')" aria-label="Diminuir Fonte">A-</button>
                <button onclick="toggleContrast()" id="contrast-toggle" aria-label="Alternar Alto Contraste">◐</button>
            </div>
        </nav>
    </header>

    <main id="conteudo-principal">
        <section class="hero reveal" aria-labelledby="hero-title">
            <div class="container">
                <h1 id="hero-title">A nobre arte de cavalgar</h1>
                <p>Descubra a harmonia, o equilíbrio e a liberdade na prática da equitação.</p>
                <a href="#servicos" class="btn-primary">Saiba mais</a>
            </div>
        </section>

        <section id="servicos" class="section container reveal" aria-labelledby="services-title">
            <h2 id="services-title">Nossas Modalidades</h2>
            <div id="services-grid" class="grid-layout">
                </div>
        </section>

        <section class="section container reveal" aria-labelledby="faq-title">
            <h2 id="faq-title">Dúvidas Frequentes</h2>
            <div id="faq-accordion" class="accordion-container">
                </div>
        </section>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2023 Equus Equitação. Desenvolvido com foco em acessibilidade.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
